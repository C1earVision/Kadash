# render.yaml — Render Blueprint for the full project
# Docs: https://render.com/docs/blueprint-spec
#
# Services:
#   1. ai-backend   — Python FastAPI (AI_BackEnd/)
#   2. node-backend — Node.js Express (BackEnd/)
#   3. frontend     — Vite/React (FrontEnd/chatbot/)
#   4. database     — Managed PostgreSQL

databases:
  - name: hardware-db
    databaseName: HardWare
    user: postgres
    plan: free         # upgrade to starter/standard in production

services:
  # ── AI Python Backend ─────────────────────────────────────────────────────
  - type: web
    name: ai-backend
    runtime: docker
    dockerfilePath: AI_BackEnd/Dockerfile
    dockerContext: AI_BackEnd
    plan: free          # bump to starter for always-on
    envVars:
      - key: GROQ_API_KEY
        sync: false     # set manually in Render dashboard
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_SERVER
        fromDatabase:
          name: hardware-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: hardware-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: hardware-db
          property: database
      - key: DATABASE_USER_NAME
        fromDatabase:
          name: hardware-db
          property: user
      - key: DATABASE_PASS
        fromDatabase:
          name: hardware-db
          property: password
      - key: API_URL
        fromService:
          type: web
          name: node-backend
          property: host
      - key: AI_BACKEND_URL
        fromService:
          type: web
          name: ai-backend
          property: host

  # ── Node.js Backend ───────────────────────────────────────────────────────
  - type: web
    name: node-backend
    runtime: docker
    dockerfilePath: BackEnd/Dockerfile
    dockerContext: BackEnd
    plan: free
    envVars:
      - key: JWT_SECRET
        sync: false     # set manually in Render dashboard
      - key: JWT_LIFETIME
        value: 30d
      - key: DATABASE_SERVER
        fromDatabase:
          name: hardware-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: hardware-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: hardware-db
          property: database
      - key: DATABASE_USER_NAME
        fromDatabase:
          name: hardware-db
          property: user
      - key: DATABASE_PASS
        fromDatabase:
          name: hardware-db
          property: password
      - key: AI_BACKEND_URL
        fromService:
          type: web
          name: ai-backend
          property: host

  # ── Frontend (Vite/React → nginx) ─────────────────────────────────────────
  - type: web
    name: frontend
    runtime: docker
    dockerfilePath: FrontEnd/chatbot/Dockerfile
    dockerContext: FrontEnd/chatbot
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: node-backend
          property: host
      - key: VITE_AI_API_URL
        fromService:
          type: web
          name: ai-backend
          property: host
